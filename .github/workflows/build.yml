name: ESP-IDF Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: esp-idf-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        idf_version:
          - v5.4.2
        target:
          - esp32

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: ${{ matrix.idf_version }}
          target: ${{ matrix.target }}
          path: .
          command: idf.py build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: boss-footswitch-${{ matrix.target }}-${{ matrix.idf_version }}
          path: |
            build/*.bin
            build/*.elf
            build/*.map
            build/flasher_args.json
            build/flash_args
